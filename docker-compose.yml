services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - MONGO_DB=mongodb://mongo:27017/fastify-tutorial
      - PORT=3000
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo-data:
